    position: relative;

  /* ── Nav bar ── */
  .nav {
    display: flex;
    align-items: center;
    padding: 56px 20px 20px;
    gap: 14px;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    color: #5B5AE0;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .back-btn svg {
    width: 22px;
    height: 22px;
  }

  .progress-track {
    flex: 1;
    height: 5px;
    background: #E4E2FA;
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #5B5AE0;
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    min-width: 5%;
  }

  /* ── Question screen ── */
  .screen {
    padding: 8px 24px 48px;
    animation: fadeSlide 0.28s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .q-text {
    font-size: 30px;
    font-weight: 700;
    color: #18182B;
    line-height: 1.2;
    margin-bottom: 28px;
    letter-spacing: -0.3px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .opt-btn {
    background: #FFFFFF;
    border: 1.5px solid #D4D2F8;
    border-radius: 16px;
    padding: 17px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #18182B;
    cursor: pointer;
    text-align: left;
    width: 100%;
    line-height: 1.4;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .opt-btn:active {
    background: #F0EFFE;
    border-color: #5B5AE0;
    transform: scale(0.985);
  }

  /* ── Confirmation screen ── */
  .conf-body {
    font-size: 16px;
    line-height: 1.7;
    color: #44445C;
    margin-bottom: 36px;
  }

    display: block;
    width: 100%;
    background: #5B5AE0;
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 17px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.01em;
  }

  .cta-btn:active {
    background: #4A49C8;
    transform: scale(0.985);
  }

  .res-eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5B5AE0;
    margin-bottom: 10px;
  }

    font-size: 34px;
    font-weight: 700;
    color: #18182B;
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: -0.5px;

    font-size: 16px;
    line-height: 1.7;
    color: #44445C;
    margin-bottom: 36px;

    font-weight: 500;

    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;

    .q-text { font-size: 26px; }
    .screen { padding: 8px 20px 48px; }
    .nav { padding: 44px 16px 16px; }

// ═══════════════════════════════════════════════════════
// STATE
// Stored as a snapshot stack — goBack() restores fully
// ═══════════════════════════════════════════════════════

let state = {
  id: 'Q1',
  q4Tag: null,
  q5Tag: null,
  answered: 0    // single-choice questions answered so far
};

let history = []; // stack of state snapshots

const MAX_QUESTIONS = 12; // approx longest path length

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════

function select(nextId) {
  // Snapshot current state before moving
  history.push(JSON.parse(JSON.stringify(state)));

  const cur = SCREENS[state.id];

  // Advance answered counter for question screens
  if (cur && cur.type === 'q') {
    state.answered++;
  }

  // Store tags when leaving a confirmation screen
  if (cur && cur.type === 'conf') {
    state.q4Tag = cur.q4Tag;
    state.q5Tag = cur.q5Tag;
  }

  state.id = nextId;
  render();
}

function goBack() {
  if (history.length === 0) return;
  state = history.pop();
  render();
}

function restart() {
  history = [];
  state = { id: 'Q1', q4Tag: null, q5Tag: null, answered: 0 };
  render();
}

// ═══════════════════════════════════════════════════════
// RESULT MATCHING
// ═══════════════════════════════════════════════════════

function resolveResult(baseId) {
  const res = RESULTS[baseId];
  if (!res) return null;
  const tag = state.q5Tag;
  for (const v of res.variants) {
    if (v.tags.includes(tag)) return { episode: res.episode, ...v };
  }
  return { episode: res.episode, ...res.variants[0] }; // fallback
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function progress() {
  return Math.max(0.05, Math.min(state.answered / MAX_QUESTIONS, 1));
}

function navHtml(showBack) {
  return `
    <div class="nav">
      <button class="back-btn" onclick="goBack()" style="${showBack ? '' : 'visibility:hidden'}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progress() * 100}%"></div>
      </div>
    </div>`;
}

function render() {
  const app = document.getElementById('app');
  const id = state.id;
  const showBack = history.length > 0;

  // EXIT
  if (id === 'EXIT') {
    app.innerHTML = `
      <div class="exit-wrap">
        <h1 class="exit-title">Thanks for your interest</h1>
        <p class="exit-body">Melba is currently designed for male partners taking the quiz on their own. We hope to expand to more situations soon.</p>
        <button class="exit-restart" onclick="restart()">Start over</button>
      </div>`;
    return;
  }

  // RESULT
  if (id.startsWith('RES-')) {
    const v = resolveResult(id);
    if (!v) return;
    app.innerHTML = `
      ${navHtml(showBack)}
      <div class="screen">
        <p class="res-eyebrow">Your episode</p>
        <h1 class="res-title">${v.episode}</h1>
        <p class="res-body">${v.body}</p>
        <button class="cta-btn">${v.cta}</button>
        <button class="res-restart" onclick="restart()">Start over</button>
      </div>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  const screen = SCREENS[id];
  if (!screen) return;

  // CONFIRMATION
  if (screen.type === 'conf') {
    const bodyParagraphs = screen.body.split('\n\n')
      .map(p => `<p class="conf-body">${p}</p>`).join('');
    app.innerHTML = `
      ${navHtml(showBack)}
      <div class="screen">
        ${bodyParagraphs}
        <button class="cta-btn" onclick="select('${screen.next}')">${screen.cta}</button>
      </div>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // QUESTION
  const opts = screen.opts.map((o, i) =>
    `<button class="opt-btn" onclick="select('${screen.next[i]}')">${o}</button>`
  ).join('');

  app.innerHTML = `
    ${navHtml(showBack)}
    <div class="screen">
      <h1 class="q-text">${screen.q}</h1>
      <div class="options">${opts}</div>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
