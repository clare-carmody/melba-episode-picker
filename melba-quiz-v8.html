  id: 'Q1',
  selectedTopics: [],  // multi-select array e.g. ['oral', 'restraint']
  chosenTopic: null,   // resolved single topic after PICK_ONE (or if only 1 selected)
  drillTag: null,      // sub-option label chosen in DRILL_DOWN
  q5Tag: null,         // blocker answer
  answered: 0
};

let history = [];

const MAX_QUESTIONS = 7; // Q1 Q2 Q3 INTERESTS [PICK_ONE] DRILL_DOWN BLOCKING

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════

// Toggle a topic on INTERESTS — updates DOM in place (no re-render, no animation)
function toggleTopic(key) {
  const idx = state.selectedTopics.indexOf(key);
  if (idx === -1) {
    state.selectedTopics.push(key);
  } else {
    state.selectedTopics.splice(idx, 1);
  }
  // Update button appearance without triggering fadeSlide
  document.querySelectorAll('[data-topic]').forEach(function(btn) {
    btn.classList.toggle('selected', state.selectedTopics.includes(btn.dataset.topic));
  });
  var cta = document.getElementById('interests-cta');
  if (cta) cta.disabled = state.selectedTopics.length === 0;
}

// Continue from INTERESTS → PICK_ONE or DRILL_DOWN
function continueInterests() {
  history.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  if (state.selectedTopics.length === 1) {
    state.chosenTopic = state.selectedTopics[0];
    state.id = 'DRILL_DOWN';
  } else {
    state.id = 'PICK_ONE';
  }
  render();
}

// Standard gate questions Q1 / Q2 / Q3
function selectQ(nextId) {
  history.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.id = nextId;
  render();
}

// Pick one topic from PICK_ONE screen
function selectPickOne(topicKey) {
  history.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.chosenTopic = topicKey;
  state.id = 'DRILL_DOWN';
  render();
}

// Select drill-down sub-option (by index to avoid quoting issues with apostrophes)
function selectDrill(idx) {
  var opts = DRILL_OPTIONS[state.chosenTopic] || [];
  history.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.drillTag = opts[idx];
  state.id = 'BLOCKING';
  render();
}

// Select blocking answer (by index)
function selectBlocking(idx) {
  history.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.q5Tag = BLOCKING_OPTS[idx].tag;
  state.id = 'CONF';
  render();
}

// Continue from CONF → episode result
function continueConf() {
  history.push(JSON.parse(JSON.stringify(state)));
  var topic = TOPICS.find(function(t) { return t.key === state.chosenTopic; });
  state.id = topic ? topic.result : 'RES-MM';
  render();
}

function goBack() {
  if (history.length === 0) return;
  state = history.pop();
  render();
}

function restart() {
  history = [];
  state = { id: 'Q1', selectedTopics: [], chosenTopic: null, drillTag: null, q5Tag: null, answered: 0 };
  render();
}

// ═══════════════════════════════════════════════════════
// RESULT MATCHING
// ═══════════════════════════════════════════════════════

function resolveResult(baseId) {
  var res = RESULTS[baseId];
  if (!res) return null;
  var tag = state.q5Tag;
  for (var i = 0; i < res.variants.length; i++) {
    if (res.variants[i].tags.indexOf(tag) !== -1) {
      return Object.assign({ episode: res.episode }, res.variants[i]);
    }
  }
  return Object.assign({ episode: res.episode }, res.variants[0]);
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

function progress() {
  return Math.max(0.05, Math.min(state.answered / MAX_QUESTIONS, 1));
}

function navHtml(showBack) {
  return '<div class="nav">' +
    '<button class="back-btn" onclick="goBack()" style="' + (showBack ? '' : 'visibility:hidden') + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="15 18 9 12 15 6"/>' +
      '</svg>' +
    '</button>' +
    '<div class="progress-track">' +
      '<div class="progress-fill" style="width:' + (progress() * 100) + '%"></div>' +
    '</div>' +
  '</div>';
}

function render() {
  var app = document.getElementById('app');
  var id = state.id;
  var showBack = history.length > 0;

  // ── EXIT ──
  if (id === 'EXIT') {
    app.innerHTML =
      '<div class="exit-wrap">' +
        '<h1 class="exit-title">Thanks for your interest</h1>' +
        '<p class="exit-body">Melba is currently designed for male partners taking the quiz on their own. We hope to expand to more situations soon.</p>' +
        '<button class="exit-restart" onclick="restart()">Start over</button>' +
      '</div>';
    return;
  }

  // ── RESULT ──
  if (id.startsWith('RES-')) {
    var v = resolveResult(id);
    if (!v) return;
    app.innerHTML =
      navHtml(showBack) +
      '<div class="screen">' +
        '<p class="res-eyebrow">Your episode</p>' +
        '<h1 class="res-title">' + v.episode + '</h1>' +
        '<p class="res-body">' + v.body + '</p>' +
        '<button class="cta-btn">' + v.cta + '</button>' +
        '<button class="res-restart" onclick="restart()">Start over</button>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // ── GATE QUESTIONS: Q1 / Q2 / Q3 ──
  if (id in GATE) {
    var screen = GATE[id];
    var opts = screen.opts.map(function(o, i) {
      return '<button class="opt-btn" onclick="selectQ(\'' + screen.next[i] + '\')">' + o + '</button>';
    }).join('');
    app.innerHTML =
      navHtml(showBack) +
      '<div class="screen">' +
        '<h1 class="q-text">' + screen.q + '</h1>' +
        '<div class="options">' + opts + '</div>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // ── INTERESTS — multi-select ──
  if (id === 'INTERESTS') {
    var toggles = TOPICS.map(function(t) {
      var sel = state.selectedTopics.indexOf(t.key) !== -1;
      return '<button class="toggle-btn' + (sel ? ' selected' : '') + '" data-topic="' + t.key + '" onclick="toggleTopic(\'' + t.key + '\')">' + t.label + '</button>';
    }).join('');
    var disabled = state.selectedTopics.length === 0;
    app.innerHTML =
      navHtml(showBack) +
      '<div class="screen">' +
        '<h1 class="q-text">What are you most excited to try?</h1>' +
        '<p class="q-subtext">Pick everything that appeals — we\'ll help you choose.</p>' +
        '<div class="options">' + toggles + '</div>' +
        '<div class="cta-wrap">' +
          '<button id="interests-cta" class="cta-btn" onclick="continueInterests()"' + (disabled ? ' disabled' : '') + '>Continue →</button>' +
        '</div>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // ── PICK ONE — dynamic single choice from selected topics ──
  if (id === 'PICK_ONE') {
    var pickOpts = TOPICS
      .filter(function(t) { return state.selectedTopics.indexOf(t.key) !== -1; })
      .map(function(t) {
        return '<button class="opt-btn" onclick="selectPickOne(\'' + t.key + '\')">' + t.label + '</button>';
      }).join('');
    app.innerHTML =
      navHtml(showBack) +
      '<div class="screen">' +
        '<h1 class="q-text">Which feels most exciting right now?</h1>' +
        '<div class="options">' + pickOpts + '</div>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // ── DRILL DOWN — sub-options for chosen topic ──
  if (id === 'DRILL_DOWN') {
    var drillOpts = (state.chosenTopic ? DRILL_OPTIONS[state.chosenTopic] : null) || [];
    var drillButtons = drillOpts.map(function(o, i) {
      return '<button class="opt-btn" onclick="selectDrill(' + i + ')">' + o + '</button>';
    }).join('');
    app.innerHTML =
      navHtml(showBack) +
      '<div class="screen">' +
        '<h1 class="q-text">What specifically appeals to you?</h1>' +
        '<div class="options">' + drillButtons + '</div>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // ── BLOCKING — what's getting in the way? ──
  if (id === 'BLOCKING') {
    var blockOpts = BLOCKING_OPTS.map(function(o, i) {
      return '<button class="opt-btn" onclick="selectBlocking(' + i + ')">' + o.label + '</button>';
    }).join('');
    app.innerHTML =
      navHtml(showBack) +
      '<div class="screen">' +
        '<h1 class="q-text">What would make this easier to actually do?</h1>' +
        '<div class="options">' + blockOpts + '</div>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }

  // ── CONF — personalised confirmation ──
  if (id === 'CONF') {
    var conf = CONFS[state.q5Tag];
    if (!conf) return;
    var paras = conf.body.split('\n\n').map(function(p) {
      return '<p class="conf-body">' + p + '</p>';
    }).join('');
    app.innerHTML =
      navHtml(showBack) +
      '<div class="screen">' +
        paras +
        '<button class="cta-btn" onclick="continueConf()">' + conf.cta + '</button>' +
      '</div>';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
