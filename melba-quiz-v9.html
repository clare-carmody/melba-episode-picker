// STATE
// ═══════════════════════════════════════════════════════

var state = {
  id: 'INTRO',
  selectedTopics: [],
  chosenTopic: null,
  drillTag: null,
  goalTag: null,   // how they want to feel after
  q5Tag: null,
  answered: 0
};

var navHistory = [];
var loaderTimeout = null; // cleared if user navigates away during LOADER

var MAX_QUESTIONS = 8; // Q1 Q2 Q3 INTERESTS [PICK_ONE] DRILL_DOWN HOW_TO_FEEL BLOCKING

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════

function clearLoaderTimeout() {
  if (loaderTimeout) { clearTimeout(loaderTimeout); loaderTimeout = null; }
}

function toggleTopic(key) {
  var idx = state.selectedTopics.indexOf(key);
  if (idx === -1) {
    state.selectedTopics.push(key);
  } else {
    state.selectedTopics.splice(idx, 1);
  }
  var topicBtns = document.querySelectorAll('[data-topic]');
  for (var i = 0; i < topicBtns.length; i++) {
    var isSelected = state.selectedTopics.indexOf(topicBtns[i].dataset.topic) !== -1;
    topicBtns[i].classList.toggle('selected', isSelected);
  }
  var cta = document.getElementById('interests-cta');
  if (cta) cta.disabled = state.selectedTopics.length === 0;
}

function continueInterests() {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  if (state.selectedTopics.length === 1) {
    state.chosenTopic = state.selectedTopics[0];
    state.id = 'DRILL_DOWN';
  } else {
    state.id = 'PICK_ONE';
  }
  render();
}

function selectQ(nextId) {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.id = nextId;
  render();
}

function selectPickOne(topicKey) {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.chosenTopic = topicKey;
  state.id = 'DRILL_DOWN';
  render();
}

function selectDrill(idx) {
  var opts = DRILL_OPTIONS[state.chosenTopic] || [];
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.drillTag = opts[idx];
  state.id = 'HOW_TO_FEEL';
  render();
}

// Select how-to-feel option (by index)
function selectHowToFeel(idx) {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.goalTag = HOW_TO_FEEL_OPTS[idx].tag;
  state.id = 'BLOCKING';
  render();
}

// v9 change: BLOCKING now routes to PARTNER_TRUST instead of CONF
function selectBlocking(idx) {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.answered++;
  state.q5Tag = BLOCKING_OPTS[idx].tag;
  state.id = 'PARTNER_TRUST';
  render();
}

// v9 new: continue from PARTNER_TRUST → CONF
function continuePartnerTrust() {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.id = 'CONF';
  render();
}

// v9 change: CONF now routes to LOADER instead of directly to result
function continueConf() {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.id = 'LOADER';
  render();
}

function goBack() {
  clearLoaderTimeout();
  if (navHistory.length === 0) return;
  state = navHistory.pop();
  render();
}

function restart() {
  clearLoaderTimeout();
  navHistory = [];
  state = { id: 'INTRO', selectedTopics: [], chosenTopic: null, drillTag: null, goalTag: null, q5Tag: null, answered: 0 };
  render();
}

function startQuiz() {
  navHistory.push(JSON.parse(JSON.stringify(state)));
  state.id = 'Q1';
  render();
}

// ═══════════════════════════════════════════════════════
// RESULT MATCHING
// ═══════════════════════════════════════════════════════

function resolveResult(baseId) {
  var res = RESULTS[baseId];
  if (!res) return null;
  var tag = state.q5Tag;
  for (var i = 0; i < res.variants.length; i++) {
    if (res.variants[i].tags.indexOf(tag) !== -1) {
      return Object.assign({ episode: res.episode }, res.variants[i]);
    }
  }
  return Object.assign({ episode: res.episode }, res.variants[0]);
}

// ═══════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════

function progress() {
  return Math.max(0.05, Math.min(state.answered / MAX_QUESTIONS, 1));
}

function navHtml(showBack) {
  return '<div class="nav">' +
    '<button class="back-btn" onclick="goBack()" style="' + (showBack ? '' : 'visibility:hidden') + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="15 18 9 12 15 6"/>' +
      '</svg>' +
    '</button>' +
    '<div class="progress-track">' +
      '<div class="progress-fill" style="width:' + (progress() * 100) + '%"></div>' +
    '</div>' +
  '</div>';
}

function beatHtml(beat) {
  return '<div class="loader-beat">' +
    '<div class="loader-icon">' + beat.icon + '</div>' +
    '<div class="loader-headline">' + beat.headline + '</div>' +
    '<div class="loader-sub">' + beat.sub + '</div>' +

}
